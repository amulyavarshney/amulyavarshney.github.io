<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="Amulya Varshney - Applied AI Portfolio">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070b14"/>
      <stop offset="45%" stop-color="#0c1526"/>
      <stop offset="100%" stop-color="#12102a"/>
    </linearGradient>
    <linearGradient id="aurora" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#8b5cf6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>
    <radialGradient id="glow1" cx="18%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="82%" cy="70%" r="45%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148,163,184,0.12)" stroke-width="1"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#glow1)"/>
  <rect width="1200" height="360" fill="url(#glow2)"/>
  <rect width="1200" height="360" fill="url(#grid)"/>

  <!-- Abstract nodes / agent graph -->
  <g opacity="0.85">
    <circle cx="920" cy="90" r="7" fill="#67e8f9"/>
    <circle cx="1040" cy="140" r="6" fill="#a78bfa"/>
    <circle cx="980" cy="230" r="8" fill="#5eead4"/>
    <circle cx="1100" cy="200" r="5" fill="#67e8f9"/>
    <circle cx="860" cy="180" r="5" fill="#c4b5fd"/>
    <line x1="920" y1="90" x2="1040" y2="140" stroke="url(#aurora)" stroke-width="1.5"/>
    <line x1="1040" y1="140" x2="980" y2="230" stroke="url(#aurora)" stroke-width="1.5"/>
    <line x1="980" y1="230" x2="1100" y2="200" stroke="url(#aurora)" stroke-width="1.5"/>
    <line x1="920" y1="90" x2="860" y2="180" stroke="url(#aurora)" stroke-width="1.5"/>
    <line x1="860" y1="180" x2="980" y2="230" stroke="url(#aurora)" stroke-width="1.5"/>
  </g>

  <!-- Soft aurora blob -->
  <ellipse cx="980" cy="160" rx="220" ry="120" fill="url(#aurora)" filter="url(#soft)" opacity="0.35"/>

  <!-- Accent bar -->
  <rect x="72" y="118" width="56" height="6" rx="3" fill="url(#text)"/>

  <text x="72" y="170" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="48" font-weight="700" fill="#f8fafc">Amulya Varshney</text>
  <text x="72" y="216" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="26" font-weight="600" fill="url(#text)">Software Engineer 2 ť Applied AI</text>
  <text x="72" y="258" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="18" fill="#94a3b8">Agents ť RAG ť LLMOps ť Full-stack products</text>

  <!-- Bottom chips -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="600">
    <rect x="72" y="290" width="92" height="28" rx="14" fill="rgba(34,211,238,0.12)" stroke="rgba(34,211,238,0.35)"/>
    <text x="118" y="308" text-anchor="middle" fill="#67e8f9">Portfolio</text>

    <rect x="176" y="290" width="88" height="28" rx="14" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.35)"/>
    <text x="220" y="308" text-anchor="middle" fill="#c4b5fd">Projects</text>

    <rect x="276" y="290" width="108" height="28" rx="14" fill="rgba(45,212,191,0.12)" stroke="rgba(45,212,191,0.35)"/>
    <text x="330" y="308" text-anchor="middle" fill="#5eead4">Playground</text>
  </g>
</svg>
